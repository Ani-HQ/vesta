name: Generate daily messages

on:
  schedule:
    - cron: "30 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Generate messages with Gemini
        run: node scripts/generate-messages.mjs
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      - name: Commit if changed
        run: |
          git config user.name "vesta-bot"
          git config user.email "actions@users.noreply.github.com"
          git add messages.json
          git diff --cached --quiet || git commit -m "chore: daily messages $(date -u +%F)"
          git push
